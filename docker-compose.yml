services:
  postgres:
    image: postgres:16-alpine
    container_name: manufacturing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ar_precision_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init_app.sql:/docker-entrypoint-initdb.d/init_app.sql:ro
    ports:
      - "5435:5432"

  backend:
    build:
      context: ./backend
    container_name: manufacturing-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: manufacturing-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - default
      - demo_network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro 
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# GLOBAL NETWORK AND VOLUME DEFINITIONS
networks:
  default:
  demo_network:
    external: true
    name: demo-1_default

volumes:
  postgres_data:
for stable
docker-compose.yml
